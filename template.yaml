AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RetailMind Java Spring Boot GenAI API

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Environment:
      Variables:
        # Faster startup for Spring Boot in Lambda
        JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
        SPRING_PROFILES_ACTIVE: "prod"

Resources:
  RetailMindApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: backend/target/api-0.0.1-SNAPSHOT-aws.jar
      Handler: com.retailmind.api.infrastructure.lambda.StreamLambdaHandler::handleRequest
      Runtime: java21
      Architectures:
        - x86_64
      Policies:
        - AmazonBedrockFullAccess
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Events:
        RetailMindApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  RetailMindApi:
    Description: "API Gateway endpoint URL for Prod environment for RetailMind API"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
